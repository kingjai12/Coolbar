<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#6c3aff" id="themeColorMeta"/>
<title>Shop Billing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--c1:#6c3aff;--c2:#3b82f6;--c3:#06b6d4;--bg1:#1a0533;--bg2:#0d1b4b;--bg3:#0a2a1a;--accent:#a78bfa;--glow:108,58,255;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(145deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);min-height:100vh;overflow-x:hidden;}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
.screen{min-height:100vh;display:flex;flex-direction:column;}
.scroll-body{flex:1;overflow-y:auto;padding:16px 14px 24px;-webkit-overflow-scrolling:touch;}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:#fff;font-weight:700;padding:13px 28px;border-radius:40px;z-index:9999;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap;pointer-events:none;display:none;max-width:90vw;backdrop-filter:blur(10px);}
.overlay{position:fixed;inset:0;background:rgba(10,5,30,.7);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.overlay.bottom{align-items:flex-end;justify-content:center;}
.dialog{background:#fff;border-radius:24px;padding:28px 24px;margin:20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.dialog-icon{font-size:44px;text-align:center;margin-bottom:12px;}
.dialog-title{font-size:18px;font-weight:800;color:#1a1a2e;text-align:center;margin-bottom:6px;}
.dialog-msg{font-size:14px;font-weight:500;color:#6b7280;text-align:center;line-height:1.5;}
.dialog-btns{display:flex;gap:10px;margin-top:20px;}
.dialog-btn{flex:1;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;}
.sheet{background:#fff;border-radius:26px 26px 0 0;width:100%;max-width:430px;padding:8px 0 36px;box-shadow:0 -10px 40px rgba(0,0,0,.3);}
.sheet-handle{width:44px;height:5px;border-radius:99px;background:#e5e7eb;margin:12px auto 10px;}
.sheet-title{text-align:center;font-weight:800;font-size:16px;color:#1a1a2e;padding:10px 20px 14px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:center;gap:8px;}
.sheet-btn{background:none;border:none;padding:15px 28px;font-size:15px;font-weight:600;cursor:pointer;text-align:left;color:#1a1a2e;width:100%;display:flex;align-items:center;gap:12px;}
.sheet-btn:hover{background:#f9fafb;}
/* PIN */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:20px 0 8px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:#e5e7eb;transition:background .2s;}
.pin-dot.filled{background:linear-gradient(135deg,var(--c1),var(--c2));}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;}
.pin-key{border:none;border-radius:14px;padding:16px 0;font-size:22px;font-weight:700;cursor:pointer;color:#1a1a2e;background:#f3f4f6;transition:all .1s;display:flex;align-items:center;justify-content:center;}
.pin-key:active{transform:scale(.93);background:#e5e7eb;}
.pin-key.del{background:#fff1f2;color:#e53e3e;}
.pin-key.zero{grid-column:2;}
.pin-error{color:#e53e3e;font-size:13px;font-weight:700;text-align:center;min-height:18px;margin-top:4px;}
.pin-hint{font-size:12px;color:#9ca3af;text-align:center;margin-top:8px;}
.pin-change-link{background:none;border:none;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;text-align:center;width:100%;margin-top:12px;text-decoration:underline;}
/* HEADER */
.header{background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 60%,var(--c3) 100%);color:#fff;padding:20px 16px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(var(--glow),.4);position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);}
.header::after{content:'';position:absolute;bottom:-30px;left:60px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05);}
.header-icon-wrap{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.3);flex-shrink:0;position:relative;z-index:1;}
.shop-name{font-size:20px;font-weight:900;letter-spacing:-.4px;position:relative;z-index:1;}
.shop-sub{font-size:11px;opacity:.75;margin-top:2px;position:relative;z-index:1;letter-spacing:.5px;}
.shop-name-row{display:flex;align-items:center;gap:6px;}
.shop-name-input{font-size:17px;font-weight:800;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:10px;padding:5px 12px;outline:none;width:150px;}
.hdr-pill{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);color:#fff;border-radius:14px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:20px;line-height:1;position:relative;z-index:1;transition:background .15s;flex-shrink:0;}
.hdr-pill:hover{background:rgba(255,255,255,.25);}
.hdr-pill-label{font-size:10px;font-weight:700;letter-spacing:.5px;}
/* CLOCK */
.clock-bar{background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.07);padding:7px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.clock-date{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
.clock-time{font-size:16px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.5px;font-variant-numeric:tabular-nums;}
.clock-dot{width:6px;height:6px;border-radius:50%;background:#34d399;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
/* NEW DAY BANNER */
.new-day-banner{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(6,182,212,.2));border:1px solid rgba(16,185,129,.35);border-radius:14px;margin:10px 14px 2px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.new-day-text{flex:1;}
.new-day-title{font-size:13px;font-weight:800;color:#34d399;}
.new-day-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.new-day-close{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);border-radius:8px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;}
/* STATS */
.stats-strip{display:flex;gap:10px;padding:14px 14px 4px;}
.stat-card{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 10px;text-align:center;backdrop-filter:blur(10px);}
.stat-val{font-size:20px;font-weight:900;color:#fff;}
.stat-lbl{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.6px;margin-top:2px;}
.section-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.4px;padding:14px 14px 8px;text-transform:uppercase;}
/* HOME GRID */
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 12px 12px;flex:1;}
.home-card{background:rgba(255,255,255,.92);border-radius:18px;padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.6);}
.home-img{width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,#ede9fe,#dbeafe);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:32px;}
.home-img img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
.home-card-name{font-size:11px;font-weight:800;text-align:center;color:#1e1b4b;line-height:1.3;}
.home-card-price{font-size:13px;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.add-tile{background:rgba(var(--glow),.15);border:2px dashed rgba(var(--glow),.4);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--accent);cursor:pointer;min-height:110px;gap:5px;transition:background .15s;}
.add-tile:hover{background:rgba(var(--glow),.25);}
.add-tile-icon{font-size:28px;}
.add-tile-lbl{font-size:11px;font-weight:800;letter-spacing:.5px;}
/* BOTTOM BAR */
.bottom-bar{display:flex;gap:10px;padding:12px 14px 26px;background:rgba(0,0,0,.3);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);}
.fab-btn{display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;border:none;border-radius:16px;padding:16px 20px;font-size:16px;font-weight:800;cursor:pointer;flex:1;position:relative;box-shadow:0 4px 15px rgba(0,0,0,.3);transition:transform .1s;letter-spacing:.2px;}
.fab-btn:active{transform:scale(.96);}
.badge{position:absolute;top:-7px;right:-7px;background:#ff3b3b;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:2px solid var(--bg1);}
/* NAVBAR */
.nav-bar{background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 100%);color:#fff;display:flex;align-items:center;padding:16px 12px;gap:6px;box-shadow:0 4px 16px rgba(var(--glow),.35);}
.back-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:700;cursor:pointer;padding:7px 12px;border-radius:10px;}
.nav-title{flex:1;text-align:center;font-weight:900;font-size:17px;color:#fff;letter-spacing:.3px;}
.nav-right-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;cursor:pointer;padding:7px 10px;border-radius:10px;white-space:nowrap;}
/* ADD SCREEN */
.add-screen-bg{background:linear-gradient(145deg,var(--bg1) 0%,var(--bg2) 100%);min-height:100vh;}
.photo-center{display:flex;flex-direction:column;align-items:center;margin-bottom:16px;}
.photo-frame{width:140px;height:140px;border-radius:28px;background:rgba(255,255,255,.08);border:2px dashed rgba(var(--glow),.5);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:pointer;font-size:60px;transition:border-color .2s;}
.photo-frame:hover{border-color:rgba(var(--glow),.9);}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.7),transparent);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:8px 0 6px;}
.photo-frame img{width:100%;height:100%;object-fit:cover;}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.pill{border-radius:12px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;transition:background .15s;}
.pill:hover{background:rgba(255,255,255,.18);}
.pill.red{background:rgba(229,62,62,.15);border-color:rgba(229,62,62,.3);color:#fca5a5;}
.pill.big{flex:1;padding:13px 8px;font-size:14px;justify-content:center;}
.emoji-sec-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.2px;margin-bottom:8px;text-align:center;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
.emoji-btn{width:46px;height:46px;border-radius:12px;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);transition:all .15s;}
.emoji-btn.active{background:rgba(var(--glow),.35);border-color:var(--c1);transform:scale(1.1);}
.field-label{font-size:11px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:1.1px;margin-bottom:6px;margin-top:14px;}
.text-input{width:100%;padding:15px 16px;font-size:17px;border-radius:14px;border:1.5px solid rgba(255,255,255,.15);outline:none;font-weight:600;color:#fff;background:rgba(255,255,255,.09);transition:border-color .2s;}
.text-input::placeholder{color:rgba(255,255,255,.3);}
.text-input:focus{border-color:rgba(var(--glow),.7);}
.save-btn{width:100%;padding:17px;border:none;border-radius:16px;font-size:18px;font-weight:800;color:#fff;cursor:pointer;margin-top:24px;background:linear-gradient(135deg,var(--c1),var(--c2));box-shadow:0 6px 20px rgba(var(--glow),.4);transition:transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-btn:active{transform:scale(.97);}
/* BILLING */
.bill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;flex:1;overflow-y:auto;}
.bill-card{background:rgba(255,255,255,.93);border-radius:20px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;border:2px solid transparent;transition:border-color .2s,box-shadow .2s,transform .1s;user-select:none;}
.bill-card.active{border-color:var(--c1);box-shadow:0 0 0 3px rgba(var(--glow),.2),0 6px 20px rgba(0,0,0,.15);}
.bill-card:active{transform:scale(.98);}
.bill-img{width:78px;height:78px;border-radius:18px;background:linear-gradient(135deg,#ede9fe,#dbeafe);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:40px;}
.bill-img img{width:100%;height:100%;object-fit:cover;border-radius:18px;}
.bill-name{font-size:13px;font-weight:800;text-align:center;color:#1e1b4b;line-height:1.3;}
.bill-price{font-size:12px;color:#9ca3af;font-weight:600;}
.counter{display:flex;align-items:center;gap:10px;margin-top:6px;}
.cnt-btn{width:40px;height:40px;border-radius:12px;border:none;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform .1s;background:#f3f4f6;color:#4b5563;}
.cnt-btn:active{transform:scale(.88);}
.cnt-btn.plus{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 3px 10px rgba(var(--glow),.35);}
.cnt-val{font-size:24px;font-weight:900;min-width:32px;text-align:center;color:#d1d5db;}
.cnt-val.active{color:#1e1b4b;}
.subtotal-badge{font-size:12px;font-weight:800;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;border-radius:20px;padding:3px 12px;margin-top:4px;}
.bill-add-tile{background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.2);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.3);cursor:pointer;min-height:168px;gap:5px;transition:background .15s;}
.bill-add-tile:hover{background:rgba(255,255,255,.1);}
.total-bar{background:rgba(0,0,0,.35);padding:14px 16px;display:flex;align-items:center;gap:14px;border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);}
.total-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:.8px;}
.total-amt{font-size:30px;font-weight:900;color:#fff;line-height:1;}
/* PAY */
.bill-summary-card{background:rgba(255,255,255,.95);border-radius:20px;padding:18px;box-shadow:0 6px 24px rgba(0,0,0,.2);margin-bottom:16px;}
.bill-summary-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.bill-summary-title{font-weight:900;font-size:15px;color:#1e1b4b;display:flex;align-items:center;gap:6px;}
.download-btn{background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(var(--glow),.3);}
.bill-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f9fafb;}
.bill-row:last-child{border-bottom:none;}
.bill-row-name{flex:1;font-size:14px;color:#374151;font-weight:600;}
.bill-row-qty{font-size:14px;color:#9ca3af;width:38px;text-align:center;}
.bill-row-amt{font-size:14px;font-weight:800;color:var(--c1);width:58px;text-align:right;}
.bill-divider{height:1.5px;background:linear-gradient(90deg,transparent,#e5e7eb,transparent);margin:10px 0;}
.big-amount{font-size:72px;font-weight:900;text-align:center;line-height:1;background:linear-gradient(135deg,var(--accent),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.pay-hint{color:rgba(255,255,255,.5);font-size:13px;font-weight:600;text-align:center;margin:6px 0 16px;}
.qr-wrap{width:220px;height:220px;margin:0 auto;background:#fff;border-radius:24px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(var(--glow),.3);border:3px solid rgba(var(--glow),.3);}
.qr-wrap img{width:100%;height:100%;object-fit:contain;}
.qr-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.qr-empty p{color:#9ca3af;font-size:13px;margin-top:8px;line-height:1.5;}
/* REPORTS */
.summ-row{display:flex;gap:10px;margin-bottom:4px;}
.summ-card{flex:1;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:16px 10px;text-align:center;backdrop-filter:blur(10px);}
.summ-icon{font-size:26px;margin-bottom:4px;}
.summ-amt{font-size:24px;font-weight:900;color:#fff;}
.summ-label{font-size:10px;color:rgba(255,255,255,.55);font-weight:700;letter-spacing:.6px;margin-top:2px;}
.summ-count{font-size:11px;color:var(--accent);font-weight:700;margin-top:2px;}
.sold-row{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.sold-icon{font-size:22px;flex-shrink:0;}
.sold-icon img{width:30px;height:30px;border-radius:8px;object-fit:cover;vertical-align:middle;}
.sold-name{flex:1;font-weight:700;font-size:14px;color:#fff;}
.sold-qty{font-weight:800;font-size:13px;color:var(--accent);}
.sold-rev{font-weight:700;font-size:12px;color:#34d399;margin-left:4px;}
.tab-row{display:flex;gap:8px;margin-bottom:12px;}
.tab-btn{flex:1;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);transition:all .15s;}
.tab-btn.active{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(var(--glow),.3);}
.hist-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px;margin-bottom:10px;}
.hist-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hist-date{font-weight:800;font-size:14px;color:#fff;}
.hist-time{font-size:11px;color:rgba(255,255,255,.4);flex:1;}
.hist-total{font-weight:900;font-size:15px;color:var(--accent);}
.hist-dl-btn{background:rgba(var(--glow),.2);border:1px solid rgba(var(--glow),.3);color:var(--accent);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:800;cursor:pointer;}
.hist-items{display:flex;flex-wrap:wrap;gap:5px;}
.hist-tag{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border-radius:8px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.1);}
.no-data{text-align:center;color:rgba(255,255,255,.3);padding:24px 0;font-size:14px;white-space:pre-line;}
/* WIDE BTN */
.wide-btn{width:100%;border:none;border-radius:16px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 5px 18px rgba(0,0,0,.25);transition:transform .1s;}
.wide-btn:active{transform:scale(.97);}
/* SETTINGS */
.settings-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;margin-bottom:10px;overflow:hidden;}
.settings-row{display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:background .15s;}
.settings-row:last-child{border-bottom:none;}
.settings-row:hover{background:rgba(255,255,255,.05);}
.settings-row-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.settings-row-info{flex:1;}
.settings-row-title{font-size:15px;font-weight:700;color:#fff;}
.settings-row-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:2px;}
.settings-chevron{color:rgba(255,255,255,.25);font-size:16px;}
/* THEME PICKER */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px;}
.theme-card{border-radius:18px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.theme-card.selected{border-color:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.3),0 6px 20px rgba(0,0,0,.4);}
.theme-preview{height:72px;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;}
.theme-preview-strip{position:absolute;top:0;left:0;right:0;height:26px;display:flex;align-items:center;padding:0 10px;gap:5px;}
.theme-preview-emoji{font-size:26px;margin-top:12px;}
.theme-preview-dots{display:flex;gap:5px;margin-top:10px;}
.theme-preview-dot{width:10px;height:10px;border-radius:50%;}
.theme-label{padding:10px 12px;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:space-between;}
.theme-name{font-size:13px;font-weight:800;color:#fff;}
.theme-check{font-size:16px;}
/* DAY LOG */
.day-log-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.day-log-icon{width:40px;height:40px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--c1),var(--c2));display:flex;align-items:center;justify-content:center;font-size:18px;}
.day-log-date{font-size:13px;font-weight:800;color:#fff;}
.day-log-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.day-log-total{font-size:16px;font-weight:900;color:var(--accent);text-align:right;}
.day-log-bills{font-size:11px;color:rgba(255,255,255,.35);text-align:right;margin-top:2px;}
.h32{height:32px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px;}
/* BILL TOOLBAR */
.bill-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px 8px;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.07);}
.bill-search-wrap{flex:1;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 12px;}
.bill-search-wrap input{background:none;border:none;outline:none;color:#fff;font-size:15px;font-weight:600;flex:1;width:100%;}
.bill-search-wrap input::placeholder{color:rgba(255,255,255,.35);}
.bill-search-clear{background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:0;line-height:1;display:flex;align-items:center;}
.size-toggle{display:flex;gap:4px;flex-shrink:0;}
.size-btn{width:34px;height:34px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-direction:column;gap:2px;padding:5px;}
.size-btn.active{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(var(--glow),.4);}
.sz-dot{border-radius:2px;background:currentColor;}
/* GRID SIZES */
.bill-grid-sm{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;flex:1;overflow-y:auto;}
.bill-grid-md{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;flex:1;overflow-y:auto;}
.bill-grid-lg{display:grid;grid-template-columns:1fr;gap:10px;padding:12px;flex:1;overflow-y:auto;}
/* SMALL CARD */
.bill-card-sm{background:rgba(255,255,255,.93);border-radius:14px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;border:2px solid transparent;transition:border-color .2s,box-shadow .2s;user-select:none;}
.bill-card-sm.active{border-color:var(--c1);box-shadow:0 0 0 2px rgba(var(--glow),.2);}
.bill-img-sm{width:52px;height:52px;border-radius:11px;background:linear-gradient(135deg,#ede9fe,#dbeafe);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:26px;}
.bill-img-sm img{width:100%;height:100%;object-fit:cover;border-radius:11px;}
.bill-name-sm{font-size:10px;font-weight:800;text-align:center;color:#1e1b4b;line-height:1.2;}
.bill-price-sm{font-size:10px;color:#9ca3af;font-weight:600;}
.counter-sm{display:flex;align-items:center;gap:4px;margin-top:3px;}
.cnt-btn-sm{width:26px;height:26px;border-radius:7px;border:none;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#4b5563;transition:transform .1s;}
.cnt-btn-sm:active{transform:scale(.88);}
.cnt-btn-sm.plus{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;}
.cnt-val-sm{font-size:15px;font-weight:900;min-width:18px;text-align:center;color:#d1d5db;}
.cnt-val-sm.active{color:#1e1b4b;}
.subtotal-sm{font-size:10px;font-weight:800;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;border-radius:20px;padding:2px 7px;margin-top:2px;}
/* LARGE CARD */
.bill-card-lg{background:rgba(255,255,255,.93);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:14px;border:2px solid transparent;transition:border-color .2s,box-shadow .2s;user-select:none;}
.bill-card-lg.active{border-color:var(--c1);box-shadow:0 0 0 3px rgba(var(--glow),.2);}
.bill-img-lg{width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#ede9fe,#dbeafe);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:38px;flex-shrink:0;}
.bill-img-lg img{width:100%;height:100%;object-fit:cover;border-radius:16px;}
.bill-info-lg{flex:1;min-width:0;}
.bill-name-lg{font-size:16px;font-weight:800;color:#1e1b4b;}
.bill-price-lg{font-size:12px;color:#9ca3af;font-weight:600;margin-top:2px;}
.subtotal-lg{font-size:13px;font-weight:800;color:var(--c1);margin-top:3px;}
.counter-lg{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cnt-btn-lg{width:42px;height:42px;border-radius:12px;border:none;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#4b5563;transition:transform .1s;}
.cnt-btn-lg:active{transform:scale(.9);}
.cnt-btn-lg.plus{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;box-shadow:0 4px 12px rgba(var(--glow),.35);}
.cnt-val-lg{font-size:26px;font-weight:900;min-width:34px;text-align:center;color:#d1d5db;}
.cnt-val-lg.active{color:#1e1b4b;}
.no-results{text-align:center;color:rgba(255,255,255,.3);padding:40px 20px;font-size:14px;line-height:1.8;}
/* WHATSAPP SHARE */
.wa-btn{width:100%;border:none;border-radius:16px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;padding:15px;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#25d366,#128c7e);box-shadow:0 5px 18px rgba(37,211,102,.35);transition:transform .1s;margin-top:10px;}
.wa-btn:active{transform:scale(.97);}
.wa-optional-label{text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.8px;margin-top:16px;margin-bottom:4px;}
.hist-wa-btn{background:rgba(37,211,102,.15);border:1px solid rgba(37,211,102,.3);color:#25d366;border-radius:8px;padding:5px 8px;font-size:12px;font-weight:800;cursor:pointer;margin-left:3px;display:inline-flex;align-items:center;gap:3px;}
</style>

(function(){
'use strict';
// STORAGE
var LS={
  get:function(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}},

function applyTheme(id){
  var t=null;
  for(var i=0;i<THEMES.length;i++){if(THEMES[i].id===id){t=THEMES[i];break;}}
  if(!t)t=THEMES[0];
  var r=document.documentElement.style;
  r.setProperty("--c1",t.c1);r.setProperty("--c2",t.c2);r.setProperty("--c3",t.c3);
  r.setProperty("--bg1",t.bg1);r.setProperty("--bg2",t.bg2);r.setProperty("--bg3",t.bg3);

  var mc=document.getElementById("themeColorMeta");if(mc)mc.content=t.c1;
  S.theme=id;LS.set(KEYS.THEME,id);
}

function initProds(){
  var s=LS.get(KEYS.P,null);
  if(!s){LS.set(KEYS.P,SEEDS);return JSON.parse(JSON.stringify(SEEDS));}
  return s;
}

// STATE
var S={
  screen:"HOME",products:initProds(),cart:{},payments:LS.get(KEYS.PAY,[]),
  qrImage:LS.getRaw(KEYS.QR),shopName:LS.get(KEYS.SHOP,"My Shop"),

  billTotal:0,billItems:[],editProd:null,confirm:null,repTab:"today",

// Apply saved theme immediately
applyTheme(S.theme);

// Check new day
(function(){
  var lastDay=LS.getRaw(KEYS.LASTDAY);
  var todayStr=new Date().toDateString();
  if(lastDay && lastDay!==todayStr){
    var yp=S.payments.filter(function(p){return new Date(p.ts).toDateString()===lastDay;});
    if(yp.length>0){

function mk(t,c){var e=document.createElement(t);if(c)e.className=c;return e;}

function bt(lbl,cl,fn){var b=mk("button",cl);b.textContent=lbl;b.onclick=fn;return b;}
function svg(id,size,color){
  size=size||20;color=color||"currentColor";
  var s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width",size);s.setAttribute("height",size);

function flash(msg,err){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=err?"linear-gradient(135deg,#c53030,#e53e3e)":"linear-gradient(135deg,#276749,#10b981)";
  t.style.display="block";
  clearTimeout(flash._t);flash._t=setTimeout(function(){t.style.display="none";},2500);
}
function readImg(file,cb){var r=new FileReader();r.onload=function(e){cb(e.target.result);};r.readAsDataURL(file);}
function totAmt(){return S.products.reduce(function(s,p){return s+(S.cart[p.id]||0)*p.price;},0);}
function totCnt(){return Object.values(S.cart).reduce(function(a,b){return a+b;},0);}
function fmtTime(d){
  var h=d.getHours(),m=d.getMinutes(),s=d.getSeconds(),ampm=h>=12?"PM":"AM";
  h=h%12||12;
  return(h<10?"0":"")+h+":"+(m<10?"0":"")+m+":"+(s<10?"0":"")+s+" "+ampm;
}
function fmtDate(d){
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return days[d.getDay()]+", "+d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();
}
function todaySales(){var ts=new Date().toDateString();return S.payments.filter(function(p){return new Date(p.ts).toDateString()===ts;}).reduce(function(a,p){return a+p.total;},0);}
function todayBills(){var ts=new Date().toDateString();return S.payments.filter(function(p){return new Date(p.ts).toDateString()===ts;}).length;}
function doManualReset(){
  var todayStr=new Date().toDateString();
  var tp=S.payments.filter(function(p){return new Date(p.ts).toDateString()===todayStr;});
  if(tp.length>0){
    var total=tp.reduce(function(a,p){return a+p.total;},0);
    S.dayLog.unshift({date:todayStr,total:total,bills:tp.length,manual:true});
    if(S.dayLog.length>90)S.dayLog=S.dayLog.slice(0,90);
    LS.set(KEYS.DAYLOG,S.dayLog);
  }
  S.cart={};flash("New billing cycle started!");
  set({screen:"HOME",newDayBanner:false});
}
function getSummary(payments){
  var ts=new Date().toDateString(),m=new Date().getMonth(),y=new Date().getFullYear();
  var dT=0,dC=0,mT=0,mC=0;
  payments.forEach(function(p){
    var d=new Date(p.ts);
    if(d.toDateString()===ts){dT+=p.total;dC++;}
    if(d.getMonth()===m&&d.getFullYear()===y){mT+=p.total;mC++;}
  });
  return{dTotal:dT,dCount:dC,mTotal:mT,mCount:mC};
}

// PASSWORD SCREEN
function drawPassword(app){
  var sc=mk("div","screen");sc.style.cssText="background:linear-gradient(145deg,var(--bg1),var(--bg2));justify-content:center;align-items:center;";
  var box=mk("div","glass");box.style.cssText="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(16px);border-radius:20px;padding:28px 24px 20px;margin:20px;max-width:340px;width:100%;";
  var ico=mk("div","dialog-icon");ico.appendChild(svg("ic-lock",46,"#a78bfa"));box.appendChild(ico);
  var titles={admin:"Admin Access",change_old:"Current Password",change_new:"New Password",change_confirm:"Confirm Password"};
  var hints={admin:"Enter password to manage items",change_old:"Enter your current 4-digit password",change_new:"Enter a new 4-digit password",change_confirm:"Re-enter new password to confirm"};
  box.appendChild(tx("div","dialog-title",titles[S.pwMode]||"Password"));
  box.appendChild(tx("div","dialog-msg",hints[S.pwMode]||""));
  var dots=mk("div","pin-dots");
  for(var i=0;i<4;i++){dots.appendChild(mk("div","pin-dot"+(i<S.pwEntry.length?" filled":"")));}
  box.appendChild(dots);
  var err=tx("div","pin-error",S.pwError);box.appendChild(err);
  var pad=mk("div","pin-pad");
  ["1","2","3","4","5","6","7","8","9","","0","\u232b"].forEach(function(k){
    if(k===""){pad.appendChild(mk("div"));return;}
    var b=mk("button","pin-key"+(k==="\u232b"?" del":"")+(k==="0"?" zero":""));
    b.textContent=k;
    b.onclick=function(){
      if(k==="\u232b"){S.pwEntry=S.pwEntry.slice(0,-1);S.pwError="";draw();return;}
      if(S.pwEntry.length>=4)return;
      S.pwEntry+=k;
      if(S.pwEntry.length===4)setTimeout(handlePin,120);
      draw();
    };
    pad.appendChild(b);
  });
  box.appendChild(pad);
  var cr=mk("div");cr.style.cssText="text-align:center;margin-top:16px;";
  var cb=bt("Cancel","",function(){set({pwMode:null,pwEntry:"",pwError:"",pwOnSuccess:null});});
  cb.style.cssText="color:var(--accent);font-weight:700;background:none;border:none;font-size:14px;cursor:pointer;";
  cr.appendChild(cb);box.appendChild(cr);
  if(S.pwMode==="admin"){
    var cl=mk("button","pin-change-link");cl.textContent="Change Password";
    cl.onclick=function(){S.pwMode="change_old";S.pwEntry="";S.pwError="";draw();};
    box.appendChild(cl);
  }
  var h2=tx("div","pin-hint",S.pwMode==="admin"?"Default password: 1234":"");box.appendChild(h2);
  sc.appendChild(box);app.appendChild(sc);
}
function handlePin(){
  if(S.pwMode==="admin"){
    if(S.pwEntry===S.password){var fn=S.pwOnSuccess;set({pwMode:null,pwEntry:"",pwError:"",pwOnSuccess:null});fn();}
    else{S.pwError="Wrong password, try again";S.pwEntry="";draw();}
  }else if(S.pwMode==="change_old"){
    if(S.pwEntry===S.password){S.pwMode="change_new";S.pwEntry="";S.pwError="";draw();}
    else{S.pwError="Wrong current password";S.pwEntry="";draw();}
  }else if(S.pwMode==="change_new"){
    S.pwNewEntry=S.pwEntry;S.pwMode="change_confirm";S.pwEntry="";S.pwError="";draw();
  }else if(S.pwMode==="change_confirm"){
    if(S.pwEntry===S.pwNewEntry){S.password=S.pwEntry;LS.set(KEYS.PASS,S.password);set({pwMode:null,pwEntry:"",pwNewEntry:"",pwError:"",pwOnSuccess:null});flash("Password changed!");}
    else{S.pwError="Passwords don't match";S.pwEntry="";draw();}
  }
}

    b.onclick=function(){S.repTab=tv[0];draw();};tabRow.appendChild(b);
  });
  body.appendChild(tabRow);

      var d=new Date(dl.date);var card=mk("div","day-log-card");

      var right=mk("div");right.appendChild(tx("div","day-log-total","Rs."+dl.total));right.appendChild(tx("div","day-log-bills",dl.bills+" bill"+(dl.bills!==1?"s":"")));
      card.append(icon,info,right);body.appendChild(card);
    });
    body.append(mk("div","h32"));sc.appendChild(body);app.appendChild(sc);return;
  }
  var now=new Date();
  var filtered=S.payments.filter(function(p){
    var d=new Date(p.ts);
    if(S.repTab==="today")return d.toDateString()===now.toDateString();
    if(S.repTab==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });
  if(!filtered.length)body.appendChild(tx("div","no-data","No payments in this period"));
  filtered.forEach(function(p){
    var card=mk("div","hist-card");var top=mk("div","hist-top");var d=new Date(p.ts);
    top.append(tx("span","hist-date",d.toLocaleDateString("en-IN",{day:"numeric",month:"short"})),tx("span","hist-time",d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})),tx("span","hist-total","Rs."+p.total));
    var dlb=mk("button","hist-dl-btn");dlb.appendChild(svg("ic-download",12,"var(--accent)"));dlb.appendChild(document.createTextNode(" Bill"));
    dlb.onclick=function(){downloadBill(S.shopName,p.items,p.total,p.ts);};
    var wab=mk("button","hist-wa-btn");wab.innerHTML="💬";wab.title="Share on WhatsApp";
    wab.onclick=function(){shareWhatsApp(S.shopName,S.shopAddress,p.items,p.total,p.ts);};
    top.append(dlb,wab);var items=mk("div","hist-items");
    p.items.forEach(function(it){items.appendChild(tx("span","hist-tag",it.name+" x"+it.qty));});
    card.append(top,items);body.appendChild(card);
  });
  body.append(mk("div","h32"));sc.appendChild(body);app.appendChild(sc);
}

// THEME PICKER
function drawTheme(app){
  var sc=mk("div","screen");sc.appendChild(nav("Choose Theme",function(){set({screen:"SETTINGS"});}));
  var body=mk("div","scroll-body");
  var hint=tx("p","","Tap any theme to apply it instantly.");
  hint.style.cssText="color:rgba(255,255,255,.45);font-size:13px;text-align:center;margin-bottom:16px;";body.appendChild(hint);
  var grid=mk("div","theme-grid");
  THEMES.forEach(function(t){
    var card=mk("div","theme-card"+(S.theme===t.id?" selected":""));
    var prev=mk("div","theme-preview");prev.style.background="linear-gradient(135deg,"+t.bg1+","+t.bg2+")";
    var strip=mk("div","theme-preview-strip");strip.style.background="linear-gradient(135deg,"+t.c1+","+t.c2+")";
    var d1=mk("div","theme-preview-dot");d1.style.background="rgba(255,255,255,.9)";
    var bar=mk("div");bar.style.cssText="width:30px;height:5px;border-radius:4px;background:rgba(255,255,255,.5);";
    strip.append(d1,bar);
    var em=tx("div","theme-preview-emoji",t.emoji);
    var dots=mk("div","theme-preview-dots");
    [t.c1,t.c2,t.accent].forEach(function(col){
      var dot=mk("div","theme-preview-dot");dot.style.background=col;dots.appendChild(dot);
    });
    prev.append(strip,em,dots);
    var lbl=mk("div","theme-label");lbl.style.background="linear-gradient(135deg,"+t.bg2+","+t.bg1+")";
    lbl.append(tx("span","theme-name",t.name),tx("span","theme-check",S.theme===t.id?"✅":""));
    card.append(prev,lbl);
    card.onclick=function(){applyTheme(t.id);flash(t.emoji+" "+t.name+" applied!");draw();};
    grid.appendChild(card);
  });
  body.appendChild(grid);
  var note=tx("p","","Theme is saved automatically.");note.style.cssText="color:rgba(255,255,255,.35);font-size:12px;text-align:center;margin-top:8px;";body.appendChild(note);
  body.append(mk("div","h32"));sc.appendChild(body);app.appendChild(sc);
}

// WHATSAPP SHARE
function buildWAText(shopName,addr,items,total,ts){
  var date=new Date(ts||Date.now());
  var dateStr=date.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
  var timeStr=date.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
  var line="─────────────────────";
  var rows=items.map(function(it){
    var amt="Rs."+(it.qty*it.price);
    var name=it.name.length>14?it.name.slice(0,14)+"..":it.name;
    return "  "+name+"  x"+it.qty+"  "+amt;
  }).join("\n");
  var msg="🧾 *BILL*\n";
  msg+="🏪 *"+(shopName||"My Shop")+"*\n";
  if(addr)msg+="📍 "+addr.replace(/\n/g,", ")+"\n";
  msg+=line+"\n";
  msg+=rows+"\n";
  msg+=line+"\n";
  msg+="💰 *TOTAL:  Rs."+total+"*\n";
  msg+=line+"\n";
  msg+="📅 "+dateStr+"  🕐 "+timeStr+"\n\n";
  msg+="🙏 Thank you! Please visit again.";
  return msg;
}
function shareWhatsApp(shopName,addr,items,total,ts){
  var text=buildWAText(shopName,addr,items,total,ts);
  var url="https://wa.me/?text="+encodeURIComponent(text);
  window.open(url,"_blank");
}

// CSV EXPORT
function exportCSV(payments,products){
  var it={};
  payments.forEach(function(p){p.items.forEach(function(x){if(!it[x.name])it[x.name]={qty:0,rev:0};it[x.name].qty+=x.qty;it[x.name].rev+=x.qty*x.price;});});
  var rows=[["Date","Time","Items Ordered","Total (Rs)"]];
  payments.forEach(function(p){
    var d=new Date(p.ts);
    rows.push([d.toLocaleDateString("en-IN"),d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}),p.items.map(function(i){return i.name+" x"+i.qty;}).join(" | "),p.total]);
  });
  rows.push([]);rows.push(["ITEM SUMMARY","","",""]);rows.push(["Item","Total Qty","Revenue (Rs)",""]);
  Object.keys(it).forEach(function(n){rows.push([n,it[n].qty,it[n].rev,""]);});
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="sales_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
